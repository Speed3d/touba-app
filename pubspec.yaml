name: popular_football
description: تطبيق طوبة - منصة كرة القدم الشعبية
publish_to: 'none'
version: 1.0.8+30

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.4
  firebase_messaging: ^16.0.4
  firebase_remote_config: ^6.1.2  # للتحكم بالتطبيق بدون تحديث (Version Control, Feature Flags)

  # State Management

  # UI Components
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^1.4.0
  flutter_map_cancellable_tile_provider: ^3.0.2
  flutter_cache_manager: ^3.3.0
  image_picker: ^1.0.5
  geolocator: ^13.0.2 # 📝 HINT AR: مكتبة الموقع الجغرافي — لمشاركة الموقع في المحادثة
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  photo_view: ^0.15.0
  carousel_slider: ^5.1.1

  # Utilities
  url_launcher: ^6.2.2
  intl: ^0.20.2
  uuid: ^4.2.2

  # Navigation


  # Loading & Dialogs
  flutter_spinkit: ^5.2.0

  # Forms
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0
  device_info_plus: ^12.3.0
  crypto: ^3.0.7
  # Local Storage — hive يعمل على Mobile + Web (IndexedDB)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.2.2
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  
  # Image Compression — flutter_image_compress للموبايل، image package للويب
  flutter_image_compress: ^2.3.0
  image: ^4.1.3
  
  # Social Login
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^6.1.2
  cloud_functions: ^6.0.7
  fl_chart: ^1.1.1
  flutter_svg: ^2.2.3
  firebase_app_check: ^0.4.1+4
  connectivity_plus: ^7.0.0
  firebase_crashlytics: ^5.0.8
  firebase_analytics: ^12.1.3
  package_info_plus: ^8.3.0  # قراءة رقم الإصدار من pubspec.yaml تلقائياً
  csv: ^6.0.0
  share_plus: ^12.0.1
  qr_flutter: ^4.1.0
  excel: ^4.0.6
  # 📝 HINT AR: مكتبات البصمة والتخزين الآمن للبيانات الحساسة
  # local_auth: للمصادقة البيومترية (بصمة الإصبع / Face ID)
  # flutter_secure_storage: لحفظ بيانات تسجيل الدخول بشكل مشفر (Keychain/Keystore)
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  mobile_scanner: ^7.2.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # 📝 HINT AR: أداة توليد أيقونات التطبيق تلقائياً من صورة واحدة
  # تُولِّد جميع الأحجام المطلوبة لـ Android و iOS
  # الاستخدام: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1
  firebase_auth_mocks: ^0.15.1
  fake_cloud_firestore: ^4.0.1
  mockito: ^5.6.3
  build_runner: ^2.11.0
  firebase_core_platform_interface: ^6.0.2
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

# ============================================================
# إعدادات توليد أيقونات التطبيق (flutter_launcher_icons)
# ============================================================
# خطوات التوليد:
#   1. flutter test test/generate_icon_background_test.dart
#   2. dart run flutter_launcher_icons
#
# adaptive_icon_foreground: حرف (ح) أبيض بخلفية شفافة
# adaptive_icon_background: صورة 1024×1024 بتدرج #7FC765 → #2EB19B
#   (تُولَّد تلقائياً بالخطوة 1 أعلاه)
#
# remove_alpha_ios: true → iOS لا يدعم الشفافية
#   يُحوِّل الشفافية إلى أبيض تلقائياً للـ iOS
#
# min_sdk_android: 21 → Android 5.0+
# ============================================================
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D9488"
  adaptive_icon_foreground: "assets/images/logo.png"
  remove_alpha_ios: true
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/defaults/customers/
    - assets/images/defaults/craftsmen/

  fonts:
    - family: Cairo
      fonts:
        #- asset: fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Regular.ttf
        #- asset: fonts/Cairo-Bold.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
          
